{% if site.enable_tooltips %}
<!-- Enable Tooltips -->
<script type="text/javascript">
$(function () {$('[data-toggle="tooltip"]').tooltip()})
</script>
{% endif %}


<!-- Load Common JS -->
<script src="{{ '/assets/js/common.js' | relative_url }}"></script>

<!-- Dynamic positioning and scroll-padding for sticky page nav -->
<script>
(function () {
  function updatePageNav() {
    var pageNav = document.querySelector('.page-nav');
    if (!pageNav) return;
    var navbar = document.querySelector('#navbar');
    var navbarH = navbar ? navbar.getBoundingClientRect().height : 0;
    pageNav.style.top = navbarH + 'px';
    var pageNavH = pageNav.getBoundingClientRect().height;
    document.documentElement.style.scrollPaddingTop = (navbarH + pageNavH + 8) + 'px';
  }
  document.addEventListener('DOMContentLoaded', updatePageNav);
  window.addEventListener('resize', updatePageNav);
})();
</script>
